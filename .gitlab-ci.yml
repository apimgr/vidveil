# GitLab CI/CD for vidveil
# Per AI.md PART 28: same gates as GitHub/Gitea - no weaker CI on any provider.
# Stages: build, test, security, release

stages:
  - build
  - test
  - security
  - release

variables:
  PROJECTNAME: vidveil
  CGO_ENABLED: "0"

# ---------------------------------------------------------------------------
# Build stage: compile all 8 platforms
# ---------------------------------------------------------------------------
.build_template: &build_template
  stage: build
  image: golang:alpine
  before_script:
    - apk add --no-cache git bash
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - export VERSION=$(cat release.txt 2>/dev/null || echo "0.0.0")
    - export COMMIT_ID=$(git rev-parse --short HEAD)
    - export BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")
    - export OFFICIALSITE=$(head -n 1 site.txt 2>/dev/null || echo "")
    - export LDFLAGS="-s -w -X 'main.Version=${VERSION}' -X 'main.CommitID=${COMMIT_ID}' -X 'main.BuildDate=${BUILD_DATE}' -X 'main.OfficialSite=${OFFICIALSITE}'"
    - export CLI_LDFLAGS="-s -w -X 'main.ProjectName=${PROJECTNAME}' -X 'main.Version=${VERSION}' -X 'main.CommitID=${COMMIT_ID}' -X 'main.BuildDate=${BUILD_DATE}' -X 'main.OfficialSite=${OFFICIALSITE}'"

build:linux-amd64:
  <<: *build_template
  script:
    - GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-linux-amd64 ./src
    - '[ -d src/client ] && GOOS=linux GOARCH=amd64 go build -ldflags "${CLI_LDFLAGS}" -o ${PROJECTNAME}-cli-linux-amd64 ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-linux-amd64
      - ${PROJECTNAME}-cli-linux-amd64
    expire_in: 1 day

build:linux-arm64:
  <<: *build_template
  script:
    - GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-linux-arm64 ./src
    - '[ -d src/client ] && GOOS=linux GOARCH=arm64 go build -ldflags "${CLI_LDFLAGS}" -o ${PROJECTNAME}-cli-linux-arm64 ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-linux-arm64
      - ${PROJECTNAME}-cli-linux-arm64
    expire_in: 1 day

build:darwin-amd64:
  <<: *build_template
  script:
    - GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-darwin-amd64 ./src
    - '[ -d src/client ] && GOOS=darwin GOARCH=amd64 go build -ldflags "${CLI_LDFLAGS}" -o ${PROJECTNAME}-cli-darwin-amd64 ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-darwin-amd64
      - ${PROJECTNAME}-cli-darwin-amd64
    expire_in: 1 day

build:darwin-arm64:
  <<: *build_template
  script:
    - GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-darwin-arm64 ./src
    - '[ -d src/client ] && GOOS=darwin GOARCH=arm64 go build -ldflags "${CLI_LDFLAGS}" -o ${PROJECTNAME}-cli-darwin-arm64 ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-darwin-arm64
      - ${PROJECTNAME}-cli-darwin-arm64
    expire_in: 1 day

build:windows-amd64:
  <<: *build_template
  script:
    - GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-windows-amd64.exe ./src
    - '[ -d src/client ] && GOOS=windows GOARCH=amd64 go build -ldflags "${CLI_LDFLAGS}" -o ${PROJECTNAME}-cli-windows-amd64.exe ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-windows-amd64.exe
      - ${PROJECTNAME}-cli-windows-amd64.exe
    expire_in: 1 day

build:windows-arm64:
  <<: *build_template
  script:
    - GOOS=windows GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-windows-arm64.exe ./src
    - '[ -d src/client ] && GOOS=windows GOARCH=arm64 go build -ldflags "${CLI_LDFLAGS}" -o ${PROJECTNAME}-cli-windows-arm64.exe ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-windows-arm64.exe
      - ${PROJECTNAME}-cli-windows-arm64.exe
    expire_in: 1 day

build:freebsd-amd64:
  <<: *build_template
  script:
    - GOOS=freebsd GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-freebsd-amd64 ./src
    - '[ -d src/client ] && GOOS=freebsd GOARCH=amd64 go build -ldflags "${CLI_LDFLAGS}" -o ${PROJECTNAME}-cli-freebsd-amd64 ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-freebsd-amd64
      - ${PROJECTNAME}-cli-freebsd-amd64
    expire_in: 1 day

build:freebsd-arm64:
  <<: *build_template
  script:
    - GOOS=freebsd GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-freebsd-arm64 ./src
    - '[ -d src/client ] && GOOS=freebsd GOARCH=arm64 go build -ldflags "${CLI_LDFLAGS}" -o ${PROJECTNAME}-cli-freebsd-arm64 ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-freebsd-arm64
      - ${PROJECTNAME}-cli-freebsd-arm64
    expire_in: 1 day

# ---------------------------------------------------------------------------
# Test stage: unit tests + lint (Linux amd64 only - no cross-compile exec)
# ---------------------------------------------------------------------------
test:unit:
  stage: test
  image: golang:alpine
  before_script:
    - apk add --no-cache git bash
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - go test -count=1 -coverprofile=coverage.out -covermode=atomic ./...
  artifacts:
    paths:
      - coverage.out
    expire_in: 7 days

test:lint:
  stage: test
  image: golang:alpine
  before_script:
    - apk add --no-cache git bash
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - |
      NON_FORMATTED=$(gofmt -l ./src 2>&1 || true)
      if [ -n "$NON_FORMATTED" ]; then
        echo "ERROR: the following files are not gofmt-clean:"
        echo "$NON_FORMATTED"
        exit 1
      fi
    - go vet ./...

# ---------------------------------------------------------------------------
# Security stage: parallel jobs per AI.md PART 28
# ---------------------------------------------------------------------------
security:secret-scan:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl
  script:
    - |
      curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      trufflehog git file://. --since-commit HEAD~10 --fail

security:dependency-scan:
  stage: security
  image: golang:alpine
  before_script:
    - apk add --no-cache git bash
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - $(go env GOPATH)/bin/govulncheck ./...

security:license-policy:
  stage: security
  image: golang:alpine
  before_script:
    - apk add --no-cache git bash
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - go install github.com/google/go-licenses@latest
    - |
      GOPATH_BIN=$(go env GOPATH)/bin
      if "$GOPATH_BIN/go-licenses" csv ./... 2>/dev/null | grep -iE 'GPL|AGPL|LGPL'; then
        echo "ERROR: copyleft license detected. AI.md PART 2 forbids GPL/AGPL/LGPL."
        exit 1
      fi

# ---------------------------------------------------------------------------
# Release stage: tagged releases only
# ---------------------------------------------------------------------------
release:publish:
  stage: release
  image: golang:alpine
  before_script:
    - apk add --no-cache git bash curl
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      COMMIT_ID=$(git rev-parse --short HEAD)
      BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")
      OFFICIALSITE=$(head -n 1 site.txt 2>/dev/null || echo "")
      LDFLAGS="-s -w -X 'main.Version=${VERSION}' -X 'main.CommitID=${COMMIT_ID}' -X 'main.BuildDate=${BUILD_DATE}' -X 'main.OfficialSite=${OFFICIALSITE}'"
      mkdir -p release-artifacts

      for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 freebsd/amd64 freebsd/arm64; do
        OS=${platform%/*}
        ARCH=${platform#*/}
        OUTPUT=release-artifacts/${PROJECTNAME}-${OS}-${ARCH}
        [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
        GOOS=$OS GOARCH=$ARCH CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o "$OUTPUT" ./src
      done

      # SHA-256 checksums
      cd release-artifacts
      sha256sum * > SHA256SUMS
      cd ..
    - echo "Release artifacts built in release-artifacts/"
  artifacts:
    paths:
      - release-artifacts/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
