name: Security

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  schedule:
    # Weekly Monday 04:17 UTC (off-peak; staggered minute to avoid thundering herd)
    - cron: '17 4 * * 1'
  workflow_dispatch:

# Read-only by default. No job here needs write access.
permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scanning (truffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (with full history for diff scan)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Run truffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab  # v3.95.3

  dependency-scan:
    name: Dependency vulnerability scan (govulncheck)
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - name: Install scan deps
        run: apk add --no-cache git bash

      - name: Checkout
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...

  workflow-policy:
    name: Workflow policy (action pinning, permissions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check workflow files for unsafe patterns
        run: |
          set -euo pipefail
          fail=0

          # Block pull_request_target without explicit guard (none expected here).
          # Exclude security.yml itself — it contains this very grep and would always self-match.
          if grep -RIn -- "pull_request_target" .github/workflows/ .gitea/workflows/ 2>/dev/null \
              | grep -v -- "/security.yml:"; then
            echo "ERROR: pull_request_target detected. Untrusted code execution paths are forbidden by AI.md PART 28."
            fail=1
          fi

          # Warn on action references that float on @main / @master / broad tag
          # (Until full SHA pinning lands, this is a soft warning, not a fail.)
          if grep -RIEn "uses: [^@]+@(main|master)\b" .github/workflows/ .gitea/workflows/ 2>/dev/null; then
            echo "WARNING: third-party actions floating on @main/@master detected (PART 28 requires full SHA pinning)."
          fi

          exit "$fail"

  license-policy:
    name: License compatibility (no GPL/AGPL/LGPL)
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - name: Install scan deps
        run: apk add --no-cache git bash

      - name: Checkout
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Verify no copyleft licenses
        run: |
          GOPATH_BIN=$(go env GOPATH)/bin
          if "$GOPATH_BIN/go-licenses" csv ./... 2>/dev/null | grep -iE 'GPL|AGPL|LGPL'; then
            echo "ERROR: copyleft license detected. AI.md PART 2 forbids GPL/AGPL/LGPL."
            exit 1
          fi
