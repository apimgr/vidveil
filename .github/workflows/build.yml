name: Build

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/devel' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/beta' }}

# Read-only by default. No job needs to write to the repo for build/test.
permissions:
  contents: read

env:
  PROJECTNAME: vidveil

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: golang:alpine
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64

    steps:
      - name: Install build deps
        run: apk add --no-cache git bash

      - name: Checkout
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set build info
        run: |
          echo "VERSION=$(cat release.txt 2>/dev/null || echo 0.0.0)" >> $GITHUB_ENV
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")" >> $GITHUB_ENV
          if [ -f site.txt ]; then
            echo "OFFICIALSITE=$(head -n 1 site.txt)" >> $GITHUB_ENV
          else
            echo "OFFICIALSITE=" >> $GITHUB_ENV
          fi

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          LDFLAGS="-s -w -X 'main.Version=${{ env.VERSION }}' -X 'main.CommitID=${{ env.COMMIT_ID }}' -X 'main.BuildDate=${{ env.BUILD_DATE }}' -X 'main.OfficialSite=${{ env.OFFICIALSITE }}'"
          go build -ldflags "${LDFLAGS}" -o ${{ env.PROJECTNAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./src

      - name: Build CLI
        if: hashFiles('src/client/') != ''
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          LDFLAGS="-s -w -X 'main.ProjectName=${{ env.PROJECTNAME }}' -X 'main.Version=${{ env.VERSION }}' -X 'main.CommitID=${{ env.COMMIT_ID }}' -X 'main.BuildDate=${{ env.BUILD_DATE }}' -X 'main.OfficialSite=${{ env.OFFICIALSITE }}'"
          go build -ldflags "${LDFLAGS}" -o ${{ env.PROJECTNAME }}-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./src/client

      - name: Run unit tests (Linux only - no cross-compile execution)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          CGO_ENABLED: 0
        run: |
          go test -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        # v5
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  validate:
    name: Repo validation
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - name: Install validation deps
        run: apk add --no-cache git bash

      - name: Checkout
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: gofmt check
        run: |
          NON_FORMATTED=$(gofmt -l ./src 2>&1 || true)
          if [ -n "$NON_FORMATTED" ]; then
            echo "ERROR: the following files are not gofmt-clean:"
            echo "$NON_FORMATTED"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: License compatibility (no GPL/AGPL/LGPL)
        run: |
          go install github.com/google/go-licenses@latest || true
          if command -v go-licenses >/dev/null 2>&1; then
            if go-licenses csv ./... 2>/dev/null | grep -iE 'GPL|AGPL|LGPL'; then
              echo "ERROR: copyleft license detected"
              exit 1
            fi
          fi
