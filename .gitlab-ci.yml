    expire_in: 7 days

release:
  stage: release
  image: casjaysdev/go:latest
  script:
    - |
      if [ -f release.txt ]; then
        VERSION=$(cat release.txt)
      elif [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
      else
        VERSION="${CI_COMMIT_SHORT_SHA}"
      fi
      echo "VERSION=${VERSION}" > build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_TAG

gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release
      artifacts: true
    - build-linux-amd64
    - build-linux-arm64
    - build-darwin-amd64
    - build-darwin-arm64
    - build-windows-amd64
    - build-windows-arm64
    - build-freebsd-amd64
    - build-freebsd-arm64
  script:
    - echo "Creating release for $VERSION"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $VERSION"
    assets:
      links:
        - name: "${PROJECTNAME}-linux-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PROJECTNAME}-linux-amd64?job=build-linux-amd64"
        - name: "${PROJECTNAME}-linux-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PROJECTNAME}-linux-arm64?job=build-linux-arm64"
        - name: "${PROJECTNAME}-darwin-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PROJECTNAME}-darwin-amd64?job=build-darwin-amd64"
        - name: "${PROJECTNAME}-darwin-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PROJECTNAME}-darwin-arm64?job=build-darwin-arm64"
        - name: "${PROJECTNAME}-windows-amd64.exe"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PROJECTNAME}-windows-amd64.exe?job=build-windows-amd64"
        - name: "${PROJECTNAME}-windows-arm64.exe"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PROJECTNAME}-windows-arm64.exe?job=build-windows-arm64"
        - name: "${PROJECTNAME}-freebsd-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PROJECTNAME}-freebsd-amd64?job=build-freebsd-amd64"
        - name: "${PROJECTNAME}-freebsd-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PROJECTNAME}-freebsd-arm64?job=build-freebsd-arm64"
  rules:
    - if: $CI_COMMIT_TAG

docker-build:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        IS_TAG=true
      else
        VERSION="${CI_COMMIT_SHORT_SHA}"
        IS_TAG=false
      fi
      COMMIT_ID=$(git rev-parse --short HEAD)
      BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")
      YYMM=$(date +"%y%m")

      docker buildx create --use || true
      docker buildx inspect --bootstrap

      TAGS="-t ${CI_REGISTRY_IMAGE}:${COMMIT_ID}"
      if [ "$IS_TAG" = "true" ]; then
        TAGS="${TAGS} -t ${CI_REGISTRY_IMAGE}:${VERSION}"
        TAGS="${TAGS} -t ${CI_REGISTRY_IMAGE}:latest"
        TAGS="${TAGS} -t ${CI_REGISTRY_IMAGE}:${YYMM}"
      else
        TAGS="${TAGS} -t ${CI_REGISTRY_IMAGE}:devel"
        if [ "$CI_COMMIT_BRANCH" = "beta" ]; then
          TAGS="${TAGS} -t ${CI_REGISTRY_IMAGE}:beta"
        fi
      fi

      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg VERSION="${VERSION}" \
        --build-arg BUILD_DATE="${BUILD_DATE}" \
        --build-arg COMMIT_ID="${COMMIT_ID}" \
        --annotation "org.opencontainers.image.vendor=apimgr" \
        --annotation "org.opencontainers.image.authors=apimgr" \
        --annotation "org.opencontainers.image.title=${PROJECTNAME}" \
        --annotation "org.opencontainers.image.description=${PROJECTNAME} - standard image (alpine)" \
        --annotation "org.opencontainers.image.version=${VERSION}" \
        --annotation "org.opencontainers.image.created=${BUILD_DATE}" \
        --annotation "org.opencontainers.image.revision=${COMMIT_ID}" \
        --annotation "org.opencontainers.image.url=${CI_PROJECT_URL}" \
        --annotation "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        --annotation "org.opencontainers.image.licenses=MIT" \
        --provenance=false \
        --push \
        -f docker/Dockerfile \
        ${TAGS} .
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
