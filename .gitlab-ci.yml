stages:
  - test
  - build
  - release
  - docker

variables:
  CGO_ENABLED: "0"
  PROJECTNAME: "vidveil"
  PROJECTORG: "apimgr"
  GO_IMAGE: "casjaysdev/go:latest"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.go-build-template: &go-build-template
  image: casjaysdev/go:latest
  before_script:
    - |
      if [ -f release.txt ]; then
        export VERSION=$(cat release.txt)
      elif [ -n "$CI_COMMIT_TAG" ]; then
        export VERSION="${CI_COMMIT_TAG#v}"
      else
        export VERSION="$(date -u +"%Y%m%d%H%M%S")"
      fi
      export COMMIT_ID=$(git rev-parse --short HEAD)
      export BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")
      if [ -f site.txt ]; then
        export OFFICIALSITE=$(cat site.txt)
      else
        export OFFICIALSITE="${OFFICIALSITE:-}"
      fi
      export LDFLAGS="-s -w -X 'main.Version=${VERSION}' -X 'main.CommitID=${COMMIT_ID}' -X 'main.BuildDate=${BUILD_DATE}' -X 'main.OfficialSite=${OFFICIALSITE}'"

lint:
  <<: *go-build-template
  stage: test
  script:
    - go vet ./...
  rules:
    - if: $CI_COMMIT_BRANCH

test:
  <<: *go-build-template
  stage: test
  script:
    - mkdir -p "/tmp/${PROJECTORG}"
    - COVDIR=$(mktemp -d "/tmp/${PROJECTORG}/${PROJECTNAME}-XXXXXX")
    - go test -buildvcs=false -cover -coverprofile="${COVDIR}/coverage.out" ./...
    - |
      THRESHOLD=80
      PCT=$(go tool cover -func="${COVDIR}/coverage.out" | awk '/^total:/ {gsub("%","",$3); print int($3)}')
      if [ "$PCT" -lt "$THRESHOLD" ]; then
        echo "ERROR: coverage $PCT% < threshold $THRESHOLD%"
        exit 1
      fi
      echo "Coverage: $PCT% (threshold: $THRESHOLD%) OK"
  rules:
    - if: $CI_COMMIT_BRANCH

vuln-check:
  <<: *go-build-template
  stage: test
  script:
    - |
      if command -v govulncheck >/dev/null 2>&1; then
        govulncheck ./...
      else
        echo "govulncheck not available in this image, skipping"
      fi
  allow_failure: true

secret-scan:
  stage: test
  image: trufflesecurity/trufflehog:latest
  script:
    - trufflehog git file://. --since-commit HEAD~1 --only-verified --fail
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build-linux-amd64:
  <<: *go-build-template
  stage: build
  variables:
    GOOS: linux
    GOARCH: amd64
  script:
    - go build -buildvcs=false -trimpath -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-linux-amd64 ./src
    - '[ -d src/client ] && go build -buildvcs=false -trimpath -ldflags "${LDFLAGS}" -o ${PROJECTNAME}-cli-linux-amd64 ./src/client || true'
  artifacts:
    paths:
      - ${PROJECTNAME}-linux-amd64
      - ${PROJECTNAME}-cli-linux-amd64
    expire_in: 7 days

