name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.ref }}
  cancel-in-progress: true

env:
  PROJECTNAME: vidveil
  PROJECTORG: apimgr

jobs:
  lint:
    if: gitea.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - run: go vet ./...
      - run: staticcheck ./...

  test:
    if: gitea.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run tests with coverage
        run: |
          mkdir -p "/tmp/${{ gitea.repository_owner }}"
          COVDIR=$(mktemp -d "/tmp/${{ gitea.repository_owner }}/$(basename "${{ gitea.repository }}")-XXXXXX")
          echo "COVDIR=$COVDIR" >> "$GITEA_ENV"
          go test -buildvcs=false -cover -coverprofile="$COVDIR/coverage.out" ./...
      - name: Enforce coverage threshold
        run: |
          THRESHOLD=80
          PCT=$(go tool cover -func="$COVDIR/coverage.out" | awk '/^total:/ {gsub("%","",$3); print int($3)}')
          if [ "$PCT" -lt "$THRESHOLD" ]; then
            echo "coverage $PCT% < threshold $THRESHOLD%"
            exit 1
          fi
          echo "Coverage: $PCT% (threshold: $THRESHOLD%) OK"
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: ${{ env.COVDIR }}/coverage.out
          retention-days: 7

  vuln-check:
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - run: govulncheck ./...

  build:
    if: gitea.event_name != 'schedule'
    needs: [lint, test]
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - run: go build -buildvcs=false ./...

  coverage:
    if: gitea.event_name != 'schedule'
    needs: [test]
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-report
          path: coverage/
      - name: Display coverage summary
        run: go tool cover -func=coverage/coverage.out

  upload-artifacts:
    if: gitea.event_name != 'schedule'
    needs: [build]
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build server binary
        run: go build -buildvcs=false -o ${{ env.PROJECTNAME }}-linux-amd64 ./src
      - name: Build CLI binary
        if: hashFiles('src/client/') != ''
        run: go build -buildvcs=false -o ${{ env.PROJECTNAME }}-cli-linux-amd64 ./src/client
      - name: Upload server artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.PROJECTNAME }}-linux-amd64
          path: ${{ env.PROJECTNAME }}-linux-amd64
          retention-days: 7
      - name: Upload CLI artifact
        if: hashFiles('src/client/') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.PROJECTNAME }}-cli-linux-amd64
          path: ${{ env.PROJECTNAME }}-cli-linux-amd64
          retention-days: 7
